<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace & Joker</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#050505;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}

.hero{
  min-height:100vh;
  position:relative;
  background:
    linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.85)),
    url("hero1-m.png");
  background-size:cover;
  background-position:center;
}

.logo{
  position:absolute;
  top:22px;
  left:22px;
  width:115px;
  z-index:5;
}

.instagram{
  position:absolute;
  bottom:55px;
  left:50%;
  transform:translateX(-50%);
  background:#d71920;
  color:white;
  text-decoration:none;
  font-weight:bold;
  letter-spacing:2px;
  padding:20px 42px;
  border-radius:6px;
  z-index:5;
  white-space:nowrap;
}

@media(min-width:800px){
  .hero{
    background-image:
      linear-gradient(to bottom,rgba(0,0,0,.15),rgba(0,0,0,.8)),
      url("hero1-d.png");
  }

  .logo{
    width:150px;
    top:32px;
    left:32px;
  }

  .instagram{
    font-size:22px;
    bottom:70px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <img src="logo.png" class="logo" alt="Ace & Joker Logo">

  <a class="instagram" href="https://instagram.com/aceandjokerig" target="_blank">
    VIEW INSTAGRAM
  </a>
</section>

</body>
</html>
