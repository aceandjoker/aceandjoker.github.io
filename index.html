<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace & Joker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

.hero{

    position:relative;
    width:100%;
    height:100vh;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,0),
        rgba(0,0,0,.01),
        rgba(0,0,0,.12)
    ),
    url("hero1-m.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

.logo{

    position:absolute;
    top:25px;
    left:25px;

    width:120px;

    z-index:10;

}

.instagram{

    position:absolute;

    left:50%;
    bottom:60px;

    transform:translateX(-50%);

    background:#d61d1d;

    color:#fff;

    text-decoration:none;

    font-family:'Bebas Neue',sans-serif;

    font-size:30px;

    letter-spacing:.5px;

    padding:18px 48px;

    border-radius:6px;

    box-shadow:0 10px 35px rgba(214,29,29,.35);

    z-index:20;

    transition:.25s;

}

.instagram:hover{

    background:#ff2d2d;

    transform:translateX(-50%) scale(1.03);

}

@media (min-width:900px){

.hero{

background:
linear-gradient(
to bottom,
rgba(0,0,0,.02),
rgba(0,0,0,.03),
rgba(0,0,0,.28)
),
url("hero1-dt.png");

background-size:cover;
background-position:center center;
background-repeat:no-repeat;

}

.logo{

width:165px;

top:35px;
left:35px;

}

.instagram{

bottom:180px;

font-size:34px;

padding:18px 58px;

}

}

</style>

</head>

<body>

<section class="hero">

<img src="logo.png" class="logo" alt="Ace & Joker">

<a class="instagram"
href="https://instagram.com/aceandjokerig"
target="_blank">

Instagram

</a>

</section>

</body>
</html>
