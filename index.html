<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace & Joker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    overflow-x:hidden;
}

.hero{
    position:relative;
    width:100%;
    height:100vh;

    background:
    linear-gradient(to bottom,
    rgba(0,0,0,.18),
    rgba(0,0,0,.15),
    rgba(0,0,0,.82)),
    url("hero1-m.png");

    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;
}

.logo{

    position:absolute;
    top:25px;
    left:25px;

    width:120px;
    z-index:20;

}

.instagram{

    position:absolute;

    left:50%;
    bottom:155px;

    transform:translateX(-50%);

    padding:18px 42px;

    background:#d71920;

    color:white;

    text-decoration:none;

    font-size:18px;

    font-weight:bold;

    letter-spacing:2px;

    border-radius:5px;

    transition:.25s;

    z-index:20;

}

.instagram:hover{

    background:#ff2c2c;

}

@media (min-width:900px){

.hero{

background:
linear-gradient(to bottom,
rgba(0,0,0,.15),
rgba(0,0,0,.10),
rgba(0,0,0,.80)),
url("hero1-d.png");

background-size:cover;
background-position:center center;

}

.logo{

width:165px;

top:35px;

left:35px;

}

.instagram{

bottom:95px;

font-size:21px;

padding:20px 50px;

}

}

</style>

</head>

<body>

<section class="hero">

<img src="logo.png" class="logo" alt="Ace & Joker">

<a class="instagram"
href="https://instagram.com/aceandjokerig"
target="_blank">

VIEW INSTAGRAM

</a>

</section>

</body>
</html>
